version: '3.8'

# Development docker-compose with additional services

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    restart: unless-stopped
    volumes:
      - .:/app
      - ./bot.db:/app/bot.db
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./backups:/app/backups
    environment:
      - LOG_LEVEL=DEBUG
    command: python bot.py

  # Optional: PostgreSQL for testing
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: botdb
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:



