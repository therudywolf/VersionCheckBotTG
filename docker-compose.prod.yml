# Production overrides for forestserver.ru deployment.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Caddy at ~/infra/caddy proxies  forestserver.ru/versionbot/*  →  versionbot-web:8000
# Wire-up:
#   ~/infra/add-site.sh add forestserver.ru ""    # ensures vhost exists
#   then edit ~/infra/caddy/sites/forestserver.ru.versionbot.caddy
#
# Containers join the shared external network so Caddy can resolve them by name.

name: versionbot

services:

  bot:
    container_name: versionbot-bot

  web:
    container_name: versionbot-web
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true
    name: forestmessenger_app_network
