services:

  # ── Telegram Bot worker ─────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    restart: unless-stopped
    volumes:
      - bot-data:/app/data
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./.env:/app/.env        # shared with web panel for settings writes
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys; sys.exit(0 if os.path.isfile('data/bot.db') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Web Admin Panel ───────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file: .env
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - bot-data:/app/data      # shared DB with bot
      - ./logs:/app/logs        # read logs
      - ./cache:/app/cache      # read/clear cache
      - ./.env:/app/.env        # read/write settings
    depends_on:
      - bot
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bot-data:
