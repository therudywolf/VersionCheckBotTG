version: '3.8'

services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./bot.db:/app/bot.db
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; conn = sqlite3.connect('bot.db'); conn.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

